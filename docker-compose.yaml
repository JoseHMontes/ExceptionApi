services:
  mysql:
    image: mysql:8.4
    container_name: jose-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jose_db
      MYSQL_USER: jose
      MYSQL_PASSWORD: jose
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
